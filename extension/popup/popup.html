<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Second Chance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <header class="popup-header">
      <div class="popup-brand">
        <img class="popup-logo" src="./logo.png" alt="Second Chance logo" />
        <div class="popup-brand-text">
          <h1 class="popup-title">Second Chance</h1>
          <p class="popup-tagline">Everyone Gets Second Chances.</p>
        </div>
      </div>
    </header>

    <main class="popup-body">
      <form id="settings-form" class="settings-form">

        <div class="settings-section">
          <label class="checkbox-field">
            <span class="checkbox-label">Enable pause before send</span>
            <input id="enabled" type="checkbox" class="toggle-input" />
            <span class="toggle-track" aria-hidden="true"></span>
          </label>
        </div>

        <div class="settings-section">
          <p class="section-label">Detection</p>
          <label class="checkbox-field">
            <span class="checkbox-label">Grammar quality</span>
            <input id="checkGrammar" type="checkbox" class="toggle-input" />
            <span class="toggle-track" aria-hidden="true"></span>
          </label>
          <label class="checkbox-field">
            <span class="checkbox-label">Formatting &amp; indentation</span>
            <input id="checkFormatting" type="checkbox" class="toggle-input" />
            <span class="toggle-track" aria-hidden="true"></span>
          </label>
          <label class="checkbox-field">
            <span class="checkbox-label">AI analysis <span style="font-size:0.75em;opacity:0.6;">(local · private)</span></span>
            <input id="llmEnabled" type="checkbox" class="toggle-input" />
            <span class="toggle-track" aria-hidden="true"></span>
          </label>
          <div class="llm-mode-row" id="llm-mode-row">
            <p class="llm-mode-label">AI model</p>
            <div class="llm-mode-options" role="group" aria-label="AI model">
              <label class="llm-mode-option">
                <input type="radio" name="llmMode" id="llmMode-fast" value="fast" class="llm-mode-input" />
                <span class="llm-mode-btn">
                  <span class="llm-mode-name">Fast</span>
                  <span class="llm-mode-desc">~1-2s</span>
                </span>
              </label>
              <label class="llm-mode-option">
                <input type="radio" name="llmMode" id="llmMode-both" value="both" class="llm-mode-input" />
                <span class="llm-mode-btn">
                  <span class="llm-mode-name">Balanced</span>
                  <span class="llm-mode-desc">Recommended</span>
                </span>
              </label>
              <label class="llm-mode-option">
                <input type="radio" name="llmMode" id="llmMode-deep" value="deep" class="llm-mode-input" />
                <span class="llm-mode-btn">
                  <span class="llm-mode-name">Accurate</span>
                  <span class="llm-mode-desc">~4-5s</span>
                </span>
              </label>
            </div>
          </div>
        </div>

        <div class="settings-section">
          <p class="section-label">Configuration</p>
          <div class="field">
            <div class="delay-header">
              <label class="field-label" for="delaySeconds">Base delay</label>
              <span id="delay-readout" class="delay-readout" aria-live="polite">20s</span>
            </div>
            <input id="delaySeconds" type="range" min="0" max="60" step="1" />
          </div>
        </div>

        <div class="actions">
          <button type="button" id="resetBtn" class="btn-reset">Reset to Defaults</button>
          <button type="submit" id="saveBtn">Save Settings</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </form>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
